services:
  - type: web
    name: atlas-studio-auth
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ACE_DATA_API_KEY
        sync: false
      - key: PORT
        value: "10000"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: "noreply@atlasnexus.tech"
